<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pediatric Dose Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <nav>
        <ul>
            <li><a href="#hero">Home</a></li>
            <li><a href="#dose-calculator">Calculator</a></li>
            <li><a href="#services">Services</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>
</header>

<section id="hero">
    <h1>Welcome to Pediatric Dose Calculator</h1>
    <p>Your trusted tool for calculating medication dosages for children.</p>
</section>

<section id="dose-calculator">
    <h2>Pediatric Dose Calculator</h2>
    <label for="weight">Child's Weight (kg):</label>
    <input type="number" id="weight" placeholder="Enter weight in kg" required>
    
    <label for="dose">Dose (mg/kg):</label>
    <input type="number" id="dose" placeholder="Enter dose in mg/kg" required>

    <label for="medication-type">Select Medication Type:</label>
    <select id="medication-type" onchange="toggleStrengthInput()">
        <option value="">Select</option>
        <option value="tablet">Tablet</option>
        <option value="syrup">Syrup</option>
    </select>

    <div id="syrup-strength" style="display: none;">
        <label for="strength">Syrup Strength (mg/5 ml):</label>
        <input type="number" id="strength" placeholder="Enter strength in mg/5 ml">
    </div>

    <button onclick="calculateDose()">Calculate Dose</button>
    
    <div id="result"></div>
</section>

<footer>
    <p>&copy; 2024 Dr. Afif Bashar. All rights reserved.</p>
</footer>

<script src="script.js"></script>
</body>
</html>
